<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f1a; color:white; }

    .header {
      display:flex; justify-content:space-between;
      padding:10px 20px; background:#111827; font-size:20px;
    }

    .tiles {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:10px; padding:10px;
    }

    .tile {
      padding:20px;
      border-radius:12px;
      text-align:center;
      background:linear-gradient(135deg,#1f2937,#111827);
    }

    .controls { text-align:center; padding:10px; }

    .controls button, .controls input {
      padding:8px; margin:5px;
      border:none; border-radius:6px;
    }

    .page { display:none; padding:15px; }
    .active { display:block; }

    table {
      width:100%; border-collapse:collapse;
      font-size:13px;
    }

    th,td {
      border:1px solid #374151;
      padding:6px; text-align:center;
    }

    th { background:#1f2937; }

    .ok { background:#065f46; }
    .bad { background:#7f1d1d; animation:blink 1s infinite; }

    @keyframes blink { 50% { opacity:0.4; } }

    .chart-row {
      display:flex;
      gap:20px;
    }

    .chart-box {
      flex:1;
      height:220px;
      background:#111827;
      padding:10px;
      border-radius:12px;
    }

    canvas {
      width:100% !important;
      height:100% !important;
    }
  </style>
</head>

<body>

<div class="header">
  <div>📊 DISPATCH DASHBOARD</div>
  <div id="clock"></div>
</div>

<div class="tiles">
  <div class="tile" id="sch"></div>
  <div class="tile" id="disp"></div>
  <div class="tile" id="pending"></div>
  <div class="tile" id="ach"></div>
</div>

<div class="controls">
  <button onclick="prevSlide()">⏮</button>
  <button onclick="pauseSlide()">⏸</button>
  <button onclick="playSlide()">▶</button>
  <button onclick="nextSlide()">⏭</button>
  📅 <input type="date" id="datePicker" onchange="applyDateFilter()">
</div>

<div id="pages"></div>

<script>

/* FIX BLUR */
Chart.defaults.devicePixelRatio = window.devicePixelRatio || 2;

/* % LABEL */
const valueLabelPlugin = {
  id: 'valueLabel',
  afterDatasetsDraw(chart) {
    const {ctx} = chart;
    ctx.save();

    let dispMeta = chart.getDatasetMeta(1);

    chart.data.labels.forEach((label, i) => {
      let disp = chart.data.datasets[1].data[i];
      let sch = chart.data.datasets[0].data[i];

      let percent = sch ? ((disp / sch) * 100).toFixed(0) : 0;

      let x = dispMeta.data[i].x;
      let y = dispMeta.data[i].y - 15;

      ctx.fillStyle = percent >= 100 ? "#22c55e" : "#ef4444";
      ctx.font = "bold 13px Arial";
      ctx.textAlign = "center";

      ctx.fillText(percent + "%", x, y);
    });

    ctx.restore();
  }
};

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv&v="+new Date().getTime();

let data=[], filtered=[], headers=[];
let pages=[], current=0, timer;
let trendChart, barChart;

/* CSV */
function parseCSV(text){
  const rows=text.trim().split("\n").map(r=>r.split(","));
  headers=rows[0];
  return rows.slice(1).map(r=>{
    let o={}; headers.forEach((h,i)=>o[h]=r[i]);
    return o;
  });
}

/* DATE */
function formatDate(d){
  let date=new Date(d);
  if(isNaN(date)) return "";
  return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
}

/* LOAD */
function load(){
  fetch(url).then(r=>r.text()).then(t=>{
    data=parseCSV(t);
    applyDateFilter();
  });
}

/* FILTER FIX */
function applyDateFilter(){
  let val=document.getElementById("datePicker").value;

  if(!val) filtered=data;
  else{
    let sel=formatDate(val);
    filtered=data.filter(r=>formatDate(r["SCHEDULE DATE"])===sel);
  }

  current = 0;
  build();
  playSlide(); // 🔥 restart slideshow
}

/* BUILD FIX */
function build(){
  document.getElementById("pages").innerHTML="";
  pages=[];

  updateTiles();
  createSlides();
  createChartSlide();

  current = 0;
  show(current);
}

/* KPI */
function updateTiles(){
  let sch=0,disp=0;

  filtered.forEach(r=>{
    sch+=+r["SCH QTY"]||0;
    disp+=+r["DISP QTY"]||0;
  });

  document.getElementById("sch").innerText="Scheduled: "+sch;
  document.getElementById("disp").innerText="Dispatched: "+disp;
  document.getElementById("pending").innerText="Pending: "+(sch-disp);
  document.getElementById("ach").innerText=
    "Ach %: "+(sch?((disp/sch)*100).toFixed(1):0)+"%";
}

/* SLIDES */
function createSlides(){
  let group={};

  filtered.forEach(r=>{
    let c=r["CUSTOMER"]||"Unknown";
    if(!group[c]) group[c]=[];
    group[c].push(r);
  });

  for(let c in group){
    let div=document.createElement("div");
    div.className="page";
    div.innerHTML=`<h2>${c}</h2>`+table(group[c]);
    pages.push(div);
    document.getElementById("pages").appendChild(div);
  }
}

/* TABLE */
function table(rows){
  let html="<table><tr>";
  headers.forEach(h=>html+=`<th>${h}</th>`);
  html+="</tr>";

  rows.forEach(r=>{
    let cls=(+r["DISP QTY"] < +r["SCH QTY"])?"bad":"ok";
    html+=`<tr class="${cls}">`;
    headers.forEach(h=>html+=`<td>${r[h]||"-"}</td>`);
    html+="</tr>";
  });

  return html+"</table>";
}

/* CHART */
function createChartSlide(){

  let div=document.createElement("div");
  div.className="page";

  div.innerHTML=`
    <h2 style="text-align:center;">📊 Overall Analysis</h2>
    <div class="chart-row">
      <div class="chart-box"><canvas id="trendChart"></canvas></div>
      <div class="chart-box"><canvas id="barChart"></canvas></div>
    </div>
  `;

  pages.push(div);
  document.getElementById("pages").appendChild(div);

  /* TREND FIX */
  let trend={};

  data.forEach(r=>{
    let raw=r["SCHEDULE DATE"];
    if(!raw) return;

    let d=formatDate(raw);
    if(!d) return;

    let day=d.split("/")[0];
    trend[day]=(trend[day]||0)+(+r["DISP QTY"]||0);
  });

  let labels=Object.keys(trend).sort((a,b)=>a-b);
  let values=labels.map(d=>trend[d]);

  if(trendChart) trendChart.destroy();

  trendChart=new Chart(document.getElementById("trendChart"),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        data:values,
        borderColor:"#22c55e",
        backgroundColor:"rgba(34,197,94,0.2)",
        fill:true,
        tension:0.4
      }]
    }
  });

  /* BAR */
  let grp={},target={};

  data.forEach(r=>{
    let c=r["CUSTOMER"];
    grp[c]=(grp[c]||0)+(+r["DISP QTY"]||0);
    target[c]=(target[c]||0)+(+r["SCH QTY"]||0);
  });

  let customers=Object.keys(target)
    .sort((a,b)=>target[b]-target[a])
    .slice(0,6);

  if(barChart) barChart.destroy();

  barChart=new Chart(document.getElementById("barChart"),{
    type:'bar',
    data:{
      labels:customers,
      datasets:[
        {label:"SCH QTY",data:customers.map(c=>target[c]),backgroundColor:"#3b82f6"},
        {label:"DISP QTY",data:customers.map(c=>grp[c]),backgroundColor:"#22c55e"}
      ]
    },
    plugins:[valueLabelPlugin]
  });
}

/* CONTROLS */
function show(i){
  pages.forEach(p=>p.classList.remove("active"));
  if(pages[i]) pages[i].classList.add("active");
}

function nextSlide(){
  if(pages.length === 0) return;
  current=(current+1)%pages.length;
  show(current);
}

function prevSlide(){
  current=(current-1+pages.length)%pages.length;
  show(current);
}

function playSlide(){
  clearInterval(timer);
  timer=setInterval(nextSlide,10000); // ⏱ 10 sec
}

function pauseSlide(){
  clearInterval(timer);
}

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText=new Date().toLocaleString();
},1000);

/* START */
load();
playSlide();

</script>

</body>
</html>
