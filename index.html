<!DOCTYPE html>
<html>
<head>
<title>Industry Dispatch Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body { margin:0; font-family:Arial; background:#0b0f1a; color:white; }

.header {
  display:flex; justify-content:space-between;
  padding:10px 20px; background:#111827;
}

.tiles {
  display:grid; grid-template-columns:repeat(5,1fr);
  gap:10px; padding:10px;
}

.tile {
  padding:15px;
  border-radius:10px;
  text-align:center;
  background:#1f2937;
}

.good { border-left:5px solid #22c55e; }
.warn { border-left:5px solid #f59e0b; }
.bad  { border-left:5px solid #ef4444; }

.controls { text-align:center; padding:10px; }

.page { display:none; padding:10px; }
.active { display:block; }

table { width:100%; border-collapse:collapse; font-size:12px; }

th,td {
  border:1px solid #374151;
  padding:5px;
  text-align:center;
}

th { background:#1f2937; }

.ok { background:#065f46; }

.delay-low { background:#78350f; }
.delay-high { background:#7f1d1d; animation:blink 1s infinite; }

@keyframes blink { 50%{opacity:0.4;} }

/* Progress bar */
.bar {
  height:6px;
  background:#374151;
  border-radius:5px;
}
.bar span {
  display:block;
  height:100%;
  background:#22c55e;
}

/* Charts */
.chart-row { display:flex; gap:15px; }
.chart-box { flex:1; height:220px; background:#111827; padding:10px; }

canvas { width:100%!important; height:100%!important; }

</style>
</head>

<body>

<div class="header">
  <div>🏭 INDUSTRY DISPATCH DASHBOARD</div>
  <div id="clock"></div>
</div>

<div class="tiles">
  <div class="tile" id="sch"></div>
  <div class="tile" id="disp"></div>
  <div class="tile" id="pending"></div>
  <div class="tile" id="ach"></div>
  <div class="tile" id="top"></div>
</div>

<div class="controls">
  📅 <input type="date" id="datePicker" onchange="applyDateFilter()">
</div>

<div id="pages"></div>

<script>

Chart.defaults.devicePixelRatio = window.devicePixelRatio || 2;

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

let data=[], filtered=[], headers=[];
let pages=[], current=0;

function parseCSV(t){
  let rows=t.trim().split("\n").map(r=>r.split(","));
  headers=rows[0];
  return rows.slice(1).map(r=>{
    let o={};
    headers.forEach((h,i)=>o[h]=r[i]);
    return o;
  });
}

function formatDate(d){
  let dt=new Date(d);
  if(isNaN(dt)) return d;
  return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`;
}

function load(){
  fetch(url).then(r=>r.text()).then(t=>{
    data=parseCSV(t);
    applyDateFilter();
  });
}

function applyDateFilter(){
  let val=document.getElementById("datePicker").value;
  if(!val) filtered=data;
  else{
    let sel=formatDate(val);
    filtered=data.filter(r=>formatDate(r["SCHEDULE DATE"])===sel);
  }
  build();
}

/* KPI + TOP */
function updateTiles(){

  let sch=0,disp=0;
  let grp={},target={};

  filtered.forEach(r=>{
    let c=r["CUSTOMER"];
    sch+=+r["SCH QTY"]||0;
    disp+=+r["DISP QTY"]||0;

    grp[c]=(grp[c]||0)+(+r["DISP QTY"]||0);
    target[c]=(target[c]||0)+(+r["SCH QTY"]||0);
  });

  let ach=sch?((disp/sch)*100).toFixed(1):0;

  document.getElementById("sch").innerText="SCH: "+sch;
  document.getElementById("disp").innerText="DISP: "+disp;
  document.getElementById("pending").innerText="PEND: "+(sch-disp);
  document.getElementById("ach").innerText="ACH: "+ach+"%";

  // Top performer
  let best="",rate=0;
  Object.keys(grp).forEach(c=>{
    let r=(grp[c]/target[c])*100;
    if(r>rate){rate=r;best=c;}
  });

  document.getElementById("top").innerText="🏆 "+best;
}

/* TABLE */
function table(rows){

  let html="<table><tr>";
  headers.forEach(h=>html+=`<th>${h}</th>`);
  html+="<th>Progress</th></tr>";

  rows.forEach(r=>{

    let sch=+r["SCH QTY"]||0;
    let disp=+r["DISP QTY"]||0;
    let percent=sch?(disp/sch)*100:0;

    let cls="ok";
    if(disp<sch && percent<50) cls="delay-high";
    else if(disp<sch) cls="delay-low";

    html+=`<tr class="${cls}">`;

    headers.forEach(h=>html+=`<td>${r[h]}</td>`);

    html+=`<td>
      <div class="bar"><span style="width:${percent}%"></span></div>
      ${percent.toFixed(0)}%
    </td>`;

    html+="</tr>";
  });

  return html+"</table>";
}

/* SLIDES */
function createSlides(){
  let grp={};

  filtered.forEach(r=>{
    let c=r["CUSTOMER"];
    if(!grp[c]) grp[c]=[];
    grp[c].push(r);
  });

  for(let c in grp){
    let d=document.createElement("div");
    d.className="page";
    d.innerHTML=`<h3>${c}</h3>`+table(grp[c]);
    pages.push(d);
    document.getElementById("pages").appendChild(d);
  }
}

/* CHART */
function createChartSlide(){

  let div=document.createElement("div");
  div.className="page";

  div.innerHTML=`
  <h3>📊 Analysis</h3>
  <div class="chart-row">
    <div class="chart-box"><canvas id="trend"></canvas></div>
    <div class="chart-box"><canvas id="bar"></canvas></div>
  </div>`;

  pages.push(div);
  document.getElementById("pages").appendChild(div);

  let trend={},grp={},target={};

  data.forEach(r=>{
    let d=formatDate(r["SCHEDULE DATE"]).split("/")[0];
    trend[d]=(trend[d]||0)+(+r["DISP QTY"]||0);

    let c=r["CUSTOMER"];
    grp[c]=(grp[c]||0)+(+r["DISP QTY"]||0);
    target[c]=(target[c]||0)+(+r["SCH QTY"]||0);
  });

  new Chart(document.getElementById("trend"),{
    type:'line',
    data:{labels:Object.keys(trend),datasets:[{data:Object.values(trend),borderColor:"#22c55e",fill:true}]}
  });

  let customers=Object.keys(target).sort((a,b)=>target[b]-target[a]).slice(0,5);

  new Chart(document.getElementById("bar"),{
    type:'bar',
    data:{
      labels:customers,
      datasets:[
        {label:"SCH",data:customers.map(c=>target[c])},
        {label:"DISP",data:customers.map(c=>grp[c])}
      ]
    }
  });
}

/* BUILD */
function build(){
  document.getElementById("pages").innerHTML="";
  pages=[];
  updateTiles();
  createSlides();
  createChartSlide();
  show(0);
}

/* SLIDES */
function show(i){
  pages.forEach(p=>p.classList.remove("active"));
  if(pages[i]) pages[i].classList.add("active");
}

setInterval(()=>{
  current=(current+1)%pages.length;
  show(current);
},4000);

/* CLOCK */
setInterval(()=>{
  document.getElementById("clock").innerText=new Date().toLocaleString();
},1000);

/* AUTO REFRESH */
setInterval(load,120000);

load();

</script>

</body>
</html>
