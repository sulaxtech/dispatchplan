<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0b0f1a; color:white; }

    .header {
      display:flex; justify-content:space-between;
      padding:10px 20px; background:#111827; font-size:20px;
    }

    .tiles {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:10px; padding:10px;
    }

    .tile { padding:20px; border-radius:10px; text-align:center; }
    .blue{background:#1e3a8a;}
    .green{background:#065f46;}
    .orange{background:#92400e;}
    .red{background:#7f1d1d;}

    .controls { text-align:center; padding:10px; }

    .controls button, .controls input {
      padding:8px; margin:5px;
      border:none; border-radius:6px;
    }

    .page { display:none; padding:15px; }
    .active { display:block; }

    table {
      width:100%; border-collapse:collapse;
      font-size:13px;
    }

    th,td {
      border:1px solid #374151;
      padding:6px; text-align:center;
    }

    th { background:#1f2937; }

    .ok { background:#065f46; }
    .bad { background:#7f1d1d; animation:blink 1s infinite; }

    @keyframes blink { 50% { opacity:0.4; } }

    /* 📊 CHART LAYOUT */
    .chart-row {
      display:flex;
      gap:20px;
      align-items:center;
    }

    .chart-box {
      flex:1;
      height:180px;
    }

    canvas {
      width:100% !important;
      height:100% !important;
    }
  </style>
</head>

<body>

<div class="header">
  <div>📊 DISPATCH DASHBOARD</div>
  <div id="clock"></div>
</div>

<div class="tiles">
  <div class="tile blue" id="sch"></div>
  <div class="tile green" id="disp"></div>
  <div class="tile orange" id="pending"></div>
  <div class="tile red" id="ach"></div>
</div>

<div class="controls">
  <button onclick="prevSlide()">⏮</button>
  <button onclick="pauseSlide()">⏸</button>
  <button onclick="playSlide()">▶</button>
  <button onclick="nextSlide()">⏭</button>

  📅 <input type="date" id="datePicker" onchange="applyDateFilter()">
</div>

<div id="pages"></div>

<script>

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

let data=[], filtered=[], headers=[];
let pages=[], current=0, timer;
let trendChart, barChart;

// CSV parser
function parseCSV(text){
  const rows=[]; let row=[],val='',q=false;
  for(let c of text){
    if(c=='"') q=!q;
    else if(c==','&&!q){row.push(val);val=''}
    else if(c=='\n'&&!q){row.push(val);rows.push(row);row=[];val=''}
    else val+=c;
  }
  if(val) row.push(val);
  if(row.length) rows.push(row);

  headers=rows[0].map(h=>h.trim());

  return rows.slice(1).map(r=>{
    let o={}; headers.forEach((h,i)=>o[h]=(r[i]||'').trim());
    return o;
  });
}

// Date format
function formatDate(d){
  let date=new Date(d);
  if(isNaN(date)) return (d||"").replace(/-/g,'/');
  return `${String(date.getDate()).padStart(2,'0')}/${String(date.getMonth()+1).padStart(2,'0')}/${date.getFullYear()}`;
}

// Load
function load(){
  fetch(url).then(r=>r.text()).then(t=>{
    data=parseCSV(t);
    applyDateFilter();
  });
}

// Date filter
function applyDateFilter(){
  let val=document.getElementById("datePicker").value;

  if(!val){
    filtered=data;
  }else{
    let sel=formatDate(val);
    filtered=data.filter(r=>formatDate(r["SCHEDULE DATE"])===sel);
  }

  build();
}

// Build
function build(){
  document.getElementById("pages").innerHTML="";
  pages=[];

  updateTiles();
  createSlides();
  createChartSlide();

  show(0);
}

// KPI
function updateTiles(){
  let sch=0,disp=0;

  filtered.forEach(r=>{
    sch+=+r["SCH QTY"]||0;
    disp+=+r["DISP QTY"]||0;
  });

  document.getElementById("sch").innerText="Scheduled: "+sch;
  document.getElementById("disp").innerText="Dispatched: "+disp;
  document.getElementById("pending").innerText="Pending: "+(sch-disp);
  document.getElementById("ach").innerText=
    "Ach %: "+(sch?((disp/sch)*100).toFixed(1):0)+"%";
}

// Customer slides
function createSlides(){
  let group={};

  filtered.forEach(r=>{
    let c=r["CUSTOMER"]||"Unknown";
    if(!group[c]) group[c]=[];
    group[c].push(r);
  });

  for(let c in group){
    let div=document.createElement("div");
    div.className="page";
    div.innerHTML=`<h2>${c}</h2>`+table(group[c]);
    pages.push(div);
    document.getElementById("pages").appendChild(div);
  }
}

// Table
function table(rows){
  let html="<table><tr>";
  headers.forEach(h=>html+=`<th>${h}</th>`);
  html+="</tr>";

  rows.forEach(r=>{
    let cls=(+r["DISP QTY"] < +r["SCH QTY"])?"bad":"ok";
    html+=`<tr class="${cls}">`;
    headers.forEach(h=>html+=`<td>${r[h]||"-"}</td>`);
    html+="</tr>";
  });

  return html+"</table>";
}

// 📊 FINAL SLIDE (TREND + BAR)
function createChartSlide(){

  let div=document.createElement("div");
  div.className="page";

  div.innerHTML=`
    <h2>📊 Overall Analysis</h2>
    <div class="chart-row">
      <div class="chart-box"><canvas id="trendChart"></canvas></div>
      <div class="chart-box"><canvas id="barChart"></canvas></div>
    </div>
  `;

  pages.push(div);
  document.getElementById("pages").appendChild(div);

  // TREND DATA
  let trend={};
  data.forEach(r=>{
    let d=formatDate(r["SCHEDULE DATE"]);
    let day=d.split("/")[0];
    trend[day]=(trend[day]||0)+(+r["DISP QTY"]||0);
  });

  let labels=Object.keys(trend).sort((a,b)=>a-b);
  let values=labels.map(d=>trend[d]);

  if(trendChart) trendChart.destroy();
  trendChart=new Chart(document.getElementById("trendChart"),{
    type:'line',
    data:{labels:labels,datasets:[{data:values,tension:0.3}]},
    options:{plugins:{legend:{display:false}}}
  });

  // BAR DATA (customer wise)
  let grp={};
  data.forEach(r=>{
    let c=r["CUSTOMER"];
    grp[c]=(grp[c]||0)+(+r["DISP QTY"]||0);
  });

  if(barChart) barChart.destroy();
  barChart=new Chart(document.getElementById("barChart"),{
    type:'bar',
    data:{
      labels:Object.keys(grp),
      datasets:[{data:Object.values(grp)}]
    },
    options:{plugins:{legend:{display:false}}}
  });
}

// Controls
function show(i){pages.forEach(p=>p.classList.remove("active")); if(pages[i]) pages[i].classList.add("active");}
function nextSlide(){current=(current+1)%pages.length;show(current);}
function prevSlide(){current=(current-1+pages.length)%pages.length;show(current);}
function playSlide(){clearInterval(timer);timer=setInterval(nextSlide,4000);}
function pauseSlide(){clearInterval(timer);}

// Clock
setInterval(()=>{document.getElementById("clock").innerText=new Date().toLocaleString();},1000);

// Start
load();
playSlide();

</script>

</body>
</html>
