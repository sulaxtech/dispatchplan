<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #111827;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    button {
      padding: 6px 12px;
      background: #2563eb;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .page {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #374151;
      padding: 8px;
      text-align: center;
    }

    .green { background: #065f46; }
    .red { background: #7f1d1d; }

    h2 {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">
  <div id="date"></div>
  <div class="buttons" id="customerButtons"></div>
</div>

<div id="pages"></div>

<canvas id="chartPage"></canvas>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

let data = [];
let customers = [];
let pages = [];
let currentPage = 0;

// CSV → JSON
function parseCSV(text) {
  const rows = text.split("\n").map(r => r.split(","));
  const headers = rows[0];

  return rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = r[i]);
    return obj;
  });
}

fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    data = parseCSV(csv);
    init();
  });

function init() {
  customers = [...new Set(data.map(r => r["Customer"]))];

  createButtons();
  createCustomerPages();
  createFailurePage();
  createNPDPage();
  createChartPage();
  createOverallPage();

  startSlideshow();
}

// Buttons
function createButtons() {
  const container = document.getElementById("customerButtons");

  customers.forEach(c => {
    let btn = document.createElement("button");
    btn.innerText = c;
    btn.onclick = () => showCustomer(c);
    container.appendChild(btn);
  });
}

// Customer Pages
function createCustomerPages() {
  const today = new Date().toISOString().split('T')[0];

  customers.forEach(c => {
    let div = document.createElement("div");
    div.className = "page";

    let rows = data.filter(r =>
      r["Customer"] == c && r["Date"] == today
    );

    div.innerHTML = `<h2>${c} - Today Dispatch</h2>` + createTable(rows);

    document.getElementById("pages").appendChild(div);
    pages.push(div);
  });
}

// Yesterday Failure
function createFailurePage() {
  let div = document.createElement("div");
  div.className = "page";

  let d = new Date();
  d.setDate(d.getDate() - 1);
  let y = d.toISOString().split('T')[0];

  let rows = data.filter(r =>
    r["Date"] == y &&
    Number(r["Sch Qty"]) > Number(r["Disp Qty"])
  );

  div.innerHTML = `<h2>Yesterday Dispatch Failure</h2>` + createTable(rows);

  document.getElementById("pages").appendChild(div);
  pages.push(div);
}

// NPD Page
function createNPDPage() {
  let div = document.createElement("div");
  div.className = "page";

  let rows = data.filter(r => r["Type"] == "NPD");

  div.innerHTML = `<h2>NPD Dispatch Status</h2>` + createTable(rows);

  document.getElementById("pages").appendChild(div);
  pages.push(div);
}

// Chart Page
function createChartPage() {
  let ctx = document.getElementById("chartPage");

  let grouped = {};

  data.forEach(r => {
    let c = r["Customer"];
    grouped[c] = (grouped[c] || 0) + Number(r["Disp Qty"] || 0);
  });

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(grouped),
      datasets: [{
        label: 'Dispatch Qty',
        data: Object.values(grouped)
      }]
    }
  });
}

// Overall Page
function createOverallPage() {
  let div = document.createElement("div");
  div.className = "page";

  let totalSch = data.reduce((a,b)=>a+Number(b["Sch Qty"]||0),0);
  let totalDisp = data.reduce((a,b)=>a+Number(b["Disp Qty"]||0),0);

  div.innerHTML = `
    <h2>Overall Summary</h2>
    <h3>Total Scheduled: ${totalSch}</h3>
    <h3>Total Dispatched: ${totalDisp}</h3>
  `;

  document.getElementById("pages").appendChild(div);
  pages.push(div);
}

// Table
function createTable(rows) {
  let html = `<table>
    <tr>
      <th>SI NO</th>
      <th>Customer</th>
      <th>Item</th>
      <th>Project</th>
      <th>Manager</th>
      <th>Sch Qty</th>
      <th>Disp Qty</th>
      <th>Remarks</th>
    </tr>`;

  rows.forEach(r => {
    let cls = (r["Remarks"] == "Dispatched" || r["Remarks"] == "Ready") ? "green" : "red";

    html += `<tr class="${cls}">
      <td>${r["SI NO"]}</td>
      <td>${r["Customer"]}</td>
      <td>${r["Item Name"]}</td>
      <td>${r["Project"]}</td>
      <td>${r["Program Manager"]}</td>
      <td>${r["Sch Qty"]}</td>
      <td>${r["Disp Qty"]}</td>
      <td>${r["Remarks"]}</td>
    </tr>`;
  });

  html += `</table>`;
  return html;
}

// Manual customer click
function showCustomer(name) {
  pages.forEach(p => p.classList.remove("active"));
  let index = customers.indexOf(name);
  pages[index].classList.add("active");
}

// Slideshow
function startSlideshow() {
  setInterval(() => {
    pages.forEach(p => p.classList.remove("active"));
    pages[currentPage].classList.add("active");

    currentPage = (currentPage + 1) % pages.length;
  }, 6000);
}

// Live clock
setInterval(() => {
  document.getElementById("date").innerText = new Date().toLocaleString();
}, 1000);

</script>

</body>
</html>
