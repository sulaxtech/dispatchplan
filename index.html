<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: #111827;
    }

    .controls {
      text-align: center;
      padding: 10px;
    }

    .controls button {
      padding: 8px 15px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .page {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #374151;
      padding: 6px;
      text-align: center;
    }

    th {
      background: #1f2937;
    }

    .ok { background: #065f46; }
    .bad { background: #7f1d1d; }

    h2 {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">
  <div>📊 Dispatch Dashboard</div>
  <div id="clock"></div>
</div>

<div class="controls">
  <button onclick="prevSlide()">⏮ Prev</button>
  <button onclick="pauseSlide()">⏸ Pause</button>
  <button onclick="playSlide()">▶ Play</button>
  <button onclick="nextSlide()">⏭ Next</button>
</div>

<div id="pages"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

let data = [];
let headers = [];
let pages = [];
let current = 0;
let timer;

// ✅ FULL CSV PARSER (handles commas inside values)
function parseCSV(text) {
  const rows = [];
  let row = [];
  let value = '';
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    let char = text[i];

    if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === ',' && !insideQuotes) {
      row.push(value);
      value = '';
    } else if (char === '\n' && !insideQuotes) {
      row.push(value);
      rows.push(row);
      row = [];
      value = '';
    } else {
      value += char;
    }
  }

  if (value) row.push(value);
  if (row.length) rows.push(row);

  headers = rows[0].map(h => h.trim());

  return rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = (r[i] || '').trim();
    });
    return obj;
  });
}

// LOAD DATA
fetch(url)
.then(r => r.text())
.then(t => {
  data = parseCSV(t);
  init();
});

// INIT
function init() {
  if (!data.length) {
    document.body.innerHTML += "<h2>No Data Found</h2>";
    return;
  }

  createSlides();
  show(0);
  playSlide();
}

// GROUP BY CUSTOMER
function createSlides() {
  let group = {};

  data.forEach(r => {
    let c = r["CUSTOMER"] || "Unknown";
    if (!group[c]) group[c] = [];
    group[c].push(r);
  });

  for (let c in group) {
    let div = document.createElement("div");
    div.className = "page";

    div.innerHTML = `<h2>${c}</h2>` + createTable(group[c]);

    document.getElementById("pages").appendChild(div);
    pages.push(div);
  }
}

// ✅ DYNAMIC TABLE (ALL COLUMNS)
function createTable(rows) {
  let html = "<table><tr>";

  headers.forEach(h => {
    html += `<th>${h}</th>`;
  });

  html += "</tr>";

  rows.forEach(r => {
    let remark = (r["REMARKS"] || "").toLowerCase();
    let cls = remark.includes("ready") ? "ok" : "bad";

    html += `<tr class="${cls}">`;

    headers.forEach(h => {
      html += `<td>${r[h] || "-"}</td>`;
    });

    html += "</tr>";
  });

  html += "</table>";
  return html;
}

// SLIDES
function show(i) {
  pages.forEach(p => p.classList.remove("active"));
  if (pages[i]) pages[i].classList.add("active");
}

function nextSlide() {
  current = (current + 1) % pages.length;
  show(current);
}

function prevSlide() {
  current = (current - 1 + pages.length) % pages.length;
  show(current);
}

function playSlide() {
  clearInterval(timer);
  timer = setInterval(nextSlide, 4000);
}

function pauseSlide() {
  clearInterval(timer);
}

// CLOCK
setInterval(() => {
  document.getElementById("clock").innerText = new Date().toLocaleString();
}, 1000);

</script>

</body>
</html>
