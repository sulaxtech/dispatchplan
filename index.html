<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px;
      background: #111827;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    button {
      padding: 6px 12px;
      background: #2563eb;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    .page {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #374151;
      padding: 8px;
      text-align: center;
    }

    .green { background: #065f46; }
    .red { background: #7f1d1d; }

    h2 {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">
  <div id="date"></div>
  <div class="buttons" id="customerButtons"></div>
</div>

<div id="pages"></div>
<canvas id="chartPage"></canvas>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

let data = [];
let customers = [];
let pages = [];
let currentPage = 0;

// ✅ SAFE CSV PARSER
function parseCSV(text) {
  const rows = text.trim().split("\n").map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
  const headers = rows[0];

  return rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = r[i]?.replace(/"/g, '').trim());
    return obj;
  });
}

// ✅ DATE FORMAT FIX
function formatDate(d) {
  let date = new Date(d);
  if (isNaN(date)) return d; // if already string

  let day = String(date.getDate()).padStart(2, '0');
  let month = String(date.getMonth() + 1).padStart(2, '0');
  let year = date.getFullYear();

  return `${day}-${month}-${year}`;
}

// FETCH DATA
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    data = parseCSV(csv);
    console.log("DATA:", data); // debug
    init();
  })
  .catch(err => console.error("Error loading sheet:", err));

// INIT
function init() {
  customers = [...new Set(data.map(r => r["Customer"]))];

  createButtons();
  createCustomerPages();
  createFailurePage();
  createChartPage();
  createOverallPage();

  startSlideshow();
}

// BUTTONS
function createButtons() {
  const container = document.getElementById("customerButtons");

  customers.forEach(c => {
    let btn = document.createElement("button");
    btn.innerText = c;
    btn.onclick = () => showCustomer(c);
    container.appendChild(btn);
  });
}

// CUSTOMER PAGES
function createCustomerPages() {
  const today = formatDate(new Date());

  customers.forEach(c => {
    let div = document.createElement("div");
    div.className = "page";

    let rows = data.filter(r =>
      r["Customer"] == c &&
      formatDate(r["Date"]) == today
    );

    div.innerHTML = `<h2>${c} - Today Dispatch</h2>` + createTable(rows);

    document.getElementById("pages").appendChild(div);
    pages.push(div);
  });
}

// YESTERDAY FAILURE
function createFailurePage() {
  let div = document.createElement("div");
  div.className = "page";

  let d = new Date();
  d.setDate(d.getDate() - 1);
  let y = formatDate(d);

  let rows = data.filter(r =>
    formatDate(r["Date"]) == y &&
    Number(r["Sch Qty"]) > Number(r["Disp Qty"])
  );

  div.innerHTML = `<h2>Yesterday Dispatch Failure</h2>` + createTable(rows);

  document.getElementById("pages").appendChild(div);
  pages.push(div);
}

// CHART
function createChartPage() {
  let ctx = document.getElementById("chartPage");

  let grouped = {};

  data.forEach(r => {
    let c = r["Customer"];
    let disp = Number(r["Disp Qty"] || 0);

    if (r["Remarks"] === "Dispatched") {
      grouped[c] = (grouped[c] || 0) + disp;
    }
  });

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(grouped),
      datasets: [{
        label: 'Dispatched Qty',
        data: Object.values(grouped)
      }]
    }
  });
}

// OVERALL
function createOverallPage() {
  let div = document.createElement("div");
  div.className = "page";

  let totalSch = data.reduce((a,b)=>a+Number(b["Sch Qty"]||0),0);
  let totalDisp = data.reduce((a,b)=>a+Number(b["Disp Qty"]||0),0);

  div.innerHTML = `
    <h2>Overall Summary</h2>
    <h3>Total Scheduled: ${totalSch}</h3>
    <h3>Total Dispatched: ${totalDisp}</h3>
  `;

  document.getElementById("pages").appendChild(div);
  pages.push(div);
}

// TABLE
function createTable(rows) {
  let html = `<table>
    <tr>
      <th>SI NO</th>
      <th>Customer</th>
      <th>Item</th>
      <th>Project</th>
      <th>Manager</th>
      <th>Sch Qty</th>
      <th>Disp Qty</th>
      <th>Remarks</th>
    </tr>`;

  rows.forEach(r => {
    let remark = (r["Remarks"] || "").toLowerCase();
    let cls = (remark === "dispatched" || remark === "ready") ? "green" : "red";

    html += `<tr class="${cls}">
      <td>${r["SI NO"]}</td>
      <td>${r["Customer"]}</td>
      <td>${r["Item Name"]}</td>
      <td>${r["Project"]}</td>
      <td>${r["Program Manager"]}</td>
      <td>${r["Sch Qty"]}</td>
      <td>${r["Disp Qty"]}</td>
      <td>${r["Remarks"]}</td>
    </tr>`;
  });

  html += `</table>`;
  return html;
}

// MANUAL CLICK
function showCustomer(name) {
  pages.forEach(p => p.classList.remove("active"));
  let index = customers.indexOf(name);
  pages[index].classList.add("active");
}

// SLIDESHOW
function startSlideshow() {
  setInterval(() => {
    pages.forEach(p => p.classList.remove("active"));
    pages[currentPage].classList.add("active");

    currentPage = (currentPage + 1) % pages.length;
  }, 5000);
}

// CLOCK
setInterval(() => {
  document.getElementById("date").innerText = new Date().toLocaleString();
}, 1000);

</script>

</body>
</html>
