<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: #111827;
    }

    .tile-bar {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .tile {
      flex: 1;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    .blue { background: #1e3a8a; }
    .green { background: #065f46; }
    .red { background: #7f1d1d; }
    .orange { background: #92400e; }

    .page {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #374151;
      padding: 8px;
      text-align: center;
    }

    .ok { background: #065f46; }
    .bad { background: #7f1d1d; }

    h2 {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">
  <div>📊 Dispatch Dashboard</div>
  <div id="clock"></div>
</div>

<div class="tile-bar">
  <div class="tile blue" id="sch">Scheduled: 0</div>
  <div class="tile green" id="disp">Dispatched: 0</div>
  <div class="tile orange" id="pending">Pending: 0</div>
  <div class="tile red" id="ach">Ach %: 0</div>
</div>

<div id="pages"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

let data = [];
let pages = [];
let currentPage = 0;

// SAFE CSV
function parseCSV(text) {
  const rows = text.trim().split("\n").map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
  const headers = rows[0];

  return rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = r[i]?.replace(/"/g, '').trim());
    return obj;
  });
}

// FETCH DATA
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    data = parseCSV(csv);
    console.log("Loaded:", data);
    init();
  })
  .catch(err => console.error(err));

// INIT
function init() {
  if (!data.length) {
    document.body.innerHTML += "<h2 style='color:red;text-align:center'>No Data Found</h2>";
    return;
  }

  updateTiles();
  createCustomerSlides();
  startSlideshow();
}

// KPI
function updateTiles() {
  let sch = 0, disp = 0;

  data.forEach(r => {
    sch += Number(r["SCH QTY"] || 0);
    disp += Number(r["DISP QTY"] || 0);
  });

  document.getElementById("sch").innerText = "Scheduled: " + sch;
  document.getElementById("disp").innerText = "Dispatched: " + disp;
  document.getElementById("pending").innerText = "Pending: " + (sch - disp);
  document.getElementById("ach").innerText = "Ach %: " + ((disp/sch*100)||0).toFixed(1);
}

// GROUP BY CUSTOMER
function createCustomerSlides() {

  let grouped = {};

  data.forEach(r => {
    let c = r["CUSTOMER"] || "Unknown";

    if (!grouped[c]) grouped[c] = [];
    grouped[c].push(r);
  });

  Object.keys(grouped).forEach(c => {

    let div = document.createElement("div");
    div.className = "page";

    div.innerHTML = `<h2>${c}</h2>` + createTable(grouped[c]);

    document.getElementById("pages").appendChild(div);
    pages.push(div);
  });
}

// TABLE
function createTable(rows) {
  let html = `<table>
    <tr>
      <th>SI NO</th>
      <th>ITEM</th>
      <th>MANAGER</th>
      <th>SCH</th>
      <th>DISP</th>
      <th>REMARKS</th>
    </tr>`;

  rows.forEach(r => {
    let remark = (r["REMARKS"] || "").toLowerCase();

    let cls = (remark.includes("ready") || remark.includes("production") || remark.includes("welding"))
      ? "ok"
      : "bad";

    html += `<tr class="${cls}">
      <td>${r["SI NO"]}</td>
      <td>${r["ITEM NAME"]}</td>
      <td>${r["PROJECT PROGRAM MANAGER"]}</td>
      <td>${r["SCH QTY"]}</td>
      <td>${r["DISP QTY"]}</td>
      <td>${r["REMARKS"]}</td>
    </tr>`;
  });

  html += `</table>`;
  return html;
}

// SLIDESHOW
function startSlideshow() {
  setInterval(() => {
    pages.forEach(p => p.classList.remove("active"));

    if (pages.length) {
      pages[currentPage].classList.add("active");
      currentPage = (currentPage + 1) % pages.length;
    }

  }, 4000);
}

// CLOCK
setInterval(() => {
  document.getElementById("clock").innerText = new Date().toLocaleString();
}, 1000);

</script>

</body>
</html>
