<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: #111827;
    }

    .tiles {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .tile {
      flex: 1;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    .blue { background: #1e3a8a; }
    .green { background: #065f46; }
    .orange { background: #92400e; }
    .red { background: #7f1d1d; }

    .controls {
      text-align: center;
      padding: 10px;
    }

    .controls button {
      padding: 8px 15px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .page {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #374151;
      padding: 8px;
      text-align: center;
    }

    .ok { background: #065f46; }
    .bad { background: #7f1d1d; }

    h2 {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">
  <div>📊 Dispatch Dashboard</div>
  <div id="clock"></div>
</div>

<div class="tiles">
  <div class="tile blue" id="sch">Scheduled: 0</div>
  <div class="tile green" id="disp">Dispatched: 0</div>
  <div class="tile orange" id="pending">Pending: 0</div>
  <div class="tile red" id="ach">Ach %: 0%</div>
</div>

<div class="controls">
  <button onclick="prevSlide()">⏮ Prev</button>
  <button onclick="pauseSlide()">⏸ Pause</button>
  <button onclick="playSlide()">▶ Play</button>
  <button onclick="nextSlide()">⏭ Next</button>
</div>

<div id="pages"></div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

let data = [];
let pages = [];
let current = 0;
let timer;

// SIMPLE CSV PARSER (SAFE)
function parseCSV(text) {
  let lines = text.trim().split("\n");
  let headers = lines[0].split(",").map(h => h.trim().toUpperCase());

  return lines.slice(1).map(line => {
    let values = line.split(",");
    let obj = {};
    headers.forEach((h, i) => obj[h] = values[i]?.trim());
    return obj;
  });
}

// LOAD DATA
fetch(url)
.then(r => r.text())
.then(t => {
  data = parseCSV(t);
  console.log(data);
  init();
})
.catch(e => {
  document.body.innerHTML += "<h2 style='color:red'>Error loading data</h2>";
});

// INIT
function init() {

  if (!data.length) {
    document.body.innerHTML += "<h2 style='color:red'>No Data Found</h2>";
    return;
  }

  updateTiles();
  createSlides();
  show(0);
  playSlide();
}

// KPI
function updateTiles() {
  let sch = 0, disp = 0;

  data.forEach(r => {
    sch += Number(r["SCH QTY"] || 0);
    disp += Number(r["DISP QTY"] || 0);
  });

  document.getElementById("sch").innerText = "Scheduled: " + sch;
  document.getElementById("disp").innerText = "Dispatched: " + disp;
  document.getElementById("pending").innerText = "Pending: " + (sch - disp);
  document.getElementById("ach").innerText =
    "Ach %: " + (sch ? ((disp/sch)*100).toFixed(1) : 0) + "%";
}

// GROUP BY CUSTOMER
function createSlides() {

  let group = {};

  data.forEach(r => {
    let c = r["CUSTOMER"] || "Unknown";
    if (!group[c]) group[c] = [];
    group[c].push(r);
  });

  for (let c in group) {
    let div = document.createElement("div");
    div.className = "page";

    div.innerHTML = `<h2>${c}</h2>` + table(group[c]);

    document.getElementById("pages").appendChild(div);
    pages.push(div);
  }
}

// TABLE
function table(rows) {
  let html = `<table>
    <tr>
      <th>SI NO</th>
      <th>ITEM</th>
      <th>MANAGER</th>
      <th>SCH</th>
      <th>DISP</th>
      <th>REMARKS</th>
    </tr>`;

  rows.forEach(r => {
    let cls = (r["REMARKS"] || "").toLowerCase().includes("ready")
      ? "ok" : "bad";

    html += `<tr class="${cls}">
      <td>${r["SI NO"] || "-"}</td>
      <td>${r["ITEM NAME"] || "-"}</td>
      <td>${r["PROJECT PROGRAM MANAGER"] || "-"}</td>
      <td>${r["SCH QTY"] || 0}</td>
      <td>${r["DISP QTY"] || 0}</td>
      <td>${r["REMARKS"] || "-"}</td>
    </tr>`;
  });

  return html + "</table>";
}

// SLIDES
function show(i) {
  pages.forEach(p => p.classList.remove("active"));
  if (pages[i]) pages[i].classList.add("active");
}

function nextSlide() {
  current = (current + 1) % pages.length;
  show(current);
}

function prevSlide() {
  current = (current - 1 + pages.length) % pages.length;
  show(current);
}

function playSlide() {
  clearInterval(timer);
  timer = setInterval(nextSlide, 4000);
}

function pauseSlide() {
  clearInterval(timer);
}

// CLOCK
setInterval(() => {
  document.getElementById("clock").innerText = new Date().toLocaleString();
}, 1000);

</script>

</body>
</html>
