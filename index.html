<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: #111827;
      font-size: 18px;
    }

    .tiles {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      padding: 15px;
    }

    .tile {
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .blue { background: #1e3a8a; }
    .green { background: #065f46; }
    .red { background: #7f1d1d; }
    .orange { background: #92400e; }

    .page {
      display: none;
      padding: 10px 20px;
    }

    .active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #374151;
      padding: 6px;
      text-align: center;
    }

    .row-green { background: #065f46; }
    .row-red { background: #7f1d1d; }

    canvas {
      width: 100% !important;
      height: 300px !important;
    }
  </style>
</head>

<body>

<div class="header">
  <div>📊 DISPATCH DASHBOARD</div>
  <div id="clock"></div>
</div>

<div class="tiles">
  <div class="tile blue" id="totalSch">Total Sch: 0</div>
  <div class="tile green" id="totalDisp">Total Disp: 0</div>
  <div class="tile orange" id="pending">Pending: 0</div>
  <div class="tile red" id="achievement">Ach %: 0%</div>
</div>

<div id="pages"></div>

<canvas id="chart"></canvas>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

let data = [];
let pages = [];
let currentPage = 0;

// CSV SAFE PARSE
function parseCSV(text) {
  const rows = text.trim().split("\n").map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
  const headers = rows[0];

  return rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = r[i]?.replace(/"/g, '').trim());
    return obj;
  });
}

// DATE FORMAT
function formatDate(d) {
  let date = new Date(d);
  if (isNaN(date)) return d;

  let day = String(date.getDate()).padStart(2, '0');
  let month = String(date.getMonth() + 1).padStart(2, '0');
  let year = date.getFullYear();

  return `${day}-${month}-${year}`;
}

// FETCH
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    data = parseCSV(csv);
    init();
  });

// INIT
function init() {
  updateTiles();
  createCustomerPages();
  createChart();
  startSlideshow();
}

// TILES
function updateTiles() {
  let totalSch = 0;
  let totalDisp = 0;

  data.forEach(r => {
    totalSch += Number(r["SCH QTY"] || 0);
    totalDisp += Number(r["DISP QTY"] || 0);
  });

  let pending = totalSch - totalDisp;
  let ach = totalSch ? ((totalDisp / totalSch) * 100).toFixed(1) : 0;

  document.getElementById("totalSch").innerText = "Total Sch: " + totalSch;
  document.getElementById("totalDisp").innerText = "Total Disp: " + totalDisp;
  document.getElementById("pending").innerText = "Pending: " + pending;
  document.getElementById("achievement").innerText = "Ach %: " + ach + "%";
}

// CUSTOMER PAGES
function createCustomerPages() {
  const today = formatDate(new Date());
  const customers = [...new Set(data.map(r => r["CUSTOMER"]))];

  customers.forEach(c => {
    let div = document.createElement("div");
    div.className = "page";

    let rows = data.filter(r =>
      r["CUSTOMER"] == c &&
      formatDate(r["SCHEDULE DATE"]) == today
    );

    div.innerHTML = `<h2>${c} - Today</h2>` + createTable(rows);

    document.getElementById("pages").appendChild(div);
    pages.push(div);
  });
}

// TABLE
function createTable(rows) {
  let html = `<table>
    <tr>
      <th>SI NO</th>
      <th>ITEM</th>
      <th>MANAGER</th>
      <th>SCH</th>
      <th>DISP</th>
      <th>STATUS</th>
    </tr>`;

  rows.forEach(r => {
    let remark = (r["REMARKS"] || "").toLowerCase();

    let cls = (remark === "ready" || remark === "production" || remark === "welding")
      ? "row-green"
      : "row-red";

    html += `<tr class="${cls}">
      <td>${r["SI NO"]}</td>
      <td>${r["ITEM NAME"]}</td>
      <td>${r["PROJECT PROGRAM MANAGER"]}</td>
      <td>${r["SCH QTY"]}</td>
      <td>${r["DISP QTY"]}</td>
      <td>${r["REMARKS"]}</td>
    </tr>`;
  });

  html += `</table>`;
  return html;
}

// CHART
function createChart() {
  let ctx = document.getElementById("chart");

  let grouped = {};

  data.forEach(r => {
    let c = r["CUSTOMER"];
    let disp = Number(r["DISP QTY"] || 0);
    grouped[c] = (grouped[c] || 0) + disp;
  });

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(grouped),
      datasets: [{
        label: 'Dispatch Qty',
        data: Object.values(grouped)
      }]
    }
  });
}

// SLIDESHOW
function startSlideshow() {
  setInterval(() => {
    pages.forEach(p => p.classList.remove("active"));
    pages[currentPage].classList.add("active");

    currentPage = (currentPage + 1) % pages.length;
  }, 4000);
}

// CLOCK
setInterval(() => {
  document.getElementById("clock").innerText = new Date().toLocaleString();
}, 1000);

</script>

</body>
</html>
