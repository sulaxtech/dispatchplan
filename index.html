<!DOCTYPE html>
<html>
<head>
  <title>Dispatch Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 10px 20px;
      background: #111827;
    }

    .tiles {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .tile {
      flex: 1;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    .blue { background: #1e3a8a; }
    .green { background: #065f46; }
    .orange { background: #92400e; }
    .red { background: #7f1d1d; }

    .controls {
      text-align: center;
      padding: 10px;
    }

    .controls button {
      padding: 8px 15px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .page {
      display: none;
      padding: 20px;
    }

    .active {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #374151;
      padding: 8px;
      text-align: center;
    }

    .ok { background: #065f46; }
    .bad { background: #7f1d1d; }

    h2 {
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">
  <div>📊 Dispatch Dashboard</div>
  <div id="clock"></div>
</div>

<div class="tiles">
  <div class="tile blue" id="sch">Scheduled: 0</div>
  <div class="tile green" id="disp">Dispatched: 0</div>
  <div class="tile orange" id="pending">Pending: 0</div>
  <div class="tile red" id="ach">Ach %: 0%</div>
</div>

<div class="controls">
  <button onclick="prevSlide()">⏮ Previous</button>
  <button onclick="pauseSlide()">⏸ Pause</button>
  <button onclick="playSlide()">▶ Play</button>
  <button onclick="nextSlide()">⏭ Next</button>
</div>

<div id="pages"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT04b2M0n-rrLlRUMu6JFJP5dxHBSQ8-4m45W47nxwwLUBDs1INcHO6jswUCnk3kp57AP3tQq19qccF/pub?output=csv";

let data = [];
let pages = [];
let currentPage = 0;
let slideInterval;

// CSV PARSER
function parseCSV(text) {
  const rows = text.trim().split("\n").map(r =>
    r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
  );

  const headers = rows[0].map(h =>
    h.replace(/[^a-zA-Z0-9]/g, '').toUpperCase()
  );

  return rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = r[i]?.replace(/"/g, '').trim();
    });
    return obj;
  });
}

// FETCH
fetch(sheetURL)
  .then(res => res.text())
  .then(csv => {
    data = parseCSV(csv);
    init();
  });

// INIT
function init() {
  data = data.filter(r => r["CUSTOMER"]);

  updateTiles();
  createSlides();
  showSlide(0);
  playSlide();
}

// KPI
function updateTiles() {
  let sch = 0, disp = 0;

  data.forEach(r => {
    sch += Number(r["SCHQTY"] || 0);
    disp += Number(r["DISPQTY"] || 0);
  });

  let pending = sch - disp;
  let ach = sch ? ((disp / sch) * 100).toFixed(1) : 0;

  document.getElementById("sch").innerText = "Scheduled: " + sch;
  document.getElementById("disp").innerText = "Dispatched: " + disp;
  document.getElementById("pending").innerText = "Pending: " + pending;
  document.getElementById("ach").innerText = "Ach %: " + ach + "%";
}

// GROUP
function createSlides() {
  let grouped = {};

  data.forEach(r => {
    let c = r["CUSTOMER"];

    if (!grouped[c]) grouped[c] = [];
    grouped[c].push(r);
  });

  Object.keys(grouped).forEach(c => {
    let div = document.createElement("div");
    div.className = "page";

    div.innerHTML = `<h2>${c}</h2>` + createTable(grouped[c]);

    document.getElementById("pages").appendChild(div);
    pages.push(div);
  });
}

// TABLE
function createTable(rows) {
  let html = `<table>
    <tr>
      <th>SI NO</th>
      <th>ITEM</th>
      <th>MANAGER</th>
      <th>SCH</th>
      <th>DISP</th>
      <th>REMARKS</th>
    </tr>`;

  rows.forEach(r => {
    let remark = (r["REMARKS"] || "").toLowerCase();

    let cls = (remark.includes("ready") || remark.includes("production") || remark.includes("welding"))
      ? "ok"
      : "bad";

    html += `<tr class="${cls}">
      <td>${r["SINO"] || "-"}</td>
      <td>${r["ITEMNAME"] || "-"}</td>
      <td>${r["PROJECTPROGRAMMANAGER"] || "-"}</td>
      <td>${r["SCHQTY"] || 0}</td>
      <td>${r["DISPQTY"] || 0}</td>
      <td>${r["REMARKS"] || "-"}</td>
    </tr>`;
  });

  html += `</table>`;
  return html;
}

// SLIDES CONTROL
function showSlide(index) {
  pages.forEach(p => p.classList.remove("active"));
  if (pages[index]) pages[index].classList.add("active");
}

function nextSlide() {
  currentPage = (currentPage + 1) % pages.length;
  showSlide(currentPage);
}

function prevSlide() {
  currentPage = (currentPage - 1 + pages.length) % pages.length;
  showSlide(currentPage);
}

function playSlide() {
  clearInterval(slideInterval);
  slideInterval = setInterval(nextSlide, 4000);
}

function pauseSlide() {
  clearInterval(slideInterval);
}

// CLOCK
setInterval(() => {
  document.getElementById("clock").innerText = new Date().toLocaleString();
}, 1000);

</script>

</body>
</html>
